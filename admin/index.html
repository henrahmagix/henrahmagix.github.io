---
layout: admin
section: Admin
css: /admin/admin.css
---

<script type="module">
  import { Admin } from './admin.js';
  import { show } from './utils.js';

  const loginForm = document.getElementById('login-form');
  const loginLogout = document.getElementById('login-logout');

  window.admin = new Admin({
    handleLogin: (loggedIn, allowRedirect) => {
      show(loginForm, !loggedIn);
      show(loginLogout, loggedIn);

      if (loggedIn) {
        if (allowRedirect) {
          window.location.pathname = '/blog';
        } else {
          document.getElementById('login-redirect').hidden = false;
        }
      }
    }
  });

  loginForm.onsubmit = (event) => {
    event.preventDefault();
    const data = new FormData(event.target);
    window.admin.login(data.get('token'), true);
  };
</script>

<form id="login-form">
  <input name="token" type="password">
  <button type="submit">Login</button>
</form>

<button hidden id="login-logout" onclick="admin.logout()">Logout</button>
<a hidden id="login-redirect" href="/blog">Go to Blog</a>
